import org.jetbrains.kotlin.gradle.dsl.JvmTarget

group 'com.webtrit.callkeep'
version '1.0-SNAPSHOT'

// Read flutter.sdk from local.properties when present (e.g. standalone test runs).
def flutterSdkPath = null
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    def localProperties = new Properties()
    localPropertiesFile.withInputStream { localProperties.load(it) }
    flutterSdkPath = localProperties.getProperty("flutter.sdk")
}

buildscript {
    ext.kotlin_version = '2.2.21'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath "org.jetbrains.kotlin:kotlin-serialization:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'kotlinx-serialization'

android {
    compileSdkVersion 36
    namespace 'com.webtrit.callkeep'

    defaultConfig {
        minSdkVersion 26
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }
}

kotlin {
    compilerOptions {
        jvmTarget.set(JvmTarget.JVM_17)
    }
}

// Resolve the Flutter engine JAR so that Pigeon-generated code (which imports
// io.flutter.*) compiles when tests are run directly via Gradle (not via Flutter).
def flutterJar = {
    def localProps = new Properties()
    def localPropsFile = new File(rootDir, 'local.properties')
    if (localPropsFile.exists()) localPropsFile.withReader('UTF-8') { localProps.load(it) }
    def flutterRoot = localProps.getProperty('flutter.sdk')
        ?: System.getenv('FLUTTER_ROOT')
    if (!flutterRoot) {
        throw new GradleException(
            "Flutter SDK not found. Set 'flutter.sdk' in local.properties " +
            "or the FLUTTER_ROOT environment variable."
        )
    }
    return "$flutterRoot/bin/cache/artifacts/engine/android-x86/flutter.jar"
}()

dependencies {
    implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.9.0"
    implementation "androidx.work:work-runtime-ktx:2.11.0"
    implementation "androidx.core:core-ktx:1.16.0"
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'

    // Flutter engine: provided by the Flutter Gradle plugin at runtime; needed
    // here only so that Pigeon-generated code can compile in standalone Gradle builds.
    compileOnly files(flutterJar)
    testImplementation files(flutterJar)

    testImplementation "junit:junit:4.13.2"
    testImplementation "org.jetbrains.kotlin:kotlin-test"
    testImplementation "androidx.test:core:1.7.0"
    testImplementation "org.robolectric:robolectric:4.16"
    testImplementation "org.mockito:mockito-core:5.21.0"
}
