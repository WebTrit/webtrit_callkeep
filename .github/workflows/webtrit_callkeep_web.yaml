name: webtrit_callkeep_web

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - ".github/workflows/webtrit_callkeep_web.yaml"
      - "webtrit_callkeep_web/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/webtrit_callkeep_web.yaml"
      - "webtrit_callkeep_web/**"

jobs:
  build:
    uses: ./.github/workflows/flutter_package.yml
    with:
      flutter_channel: stable
      flutter_version: 3.32.0
      working_directory: webtrit_callkeep_web
      format_line_length: "120"
      format_directories: "lib"
      analyze_directories: "lib"
      run_tests: false

